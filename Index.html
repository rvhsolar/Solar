<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0A0A0A;--bg2:#111;--bg3:#181818;--line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.13);--text:#EDE9E3;--text2:#6E6A64;--text3:#3A3835;--gold:#C9963A;--hot:#B03A2E;--warm:#B5540C;--cold:#1A5276;--conf:#1A6B3A;--fup:#4A2080;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden;}
.app{display:flex;height:100vh;}
.sb{width:190px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;}
.sb-logo{padding:16px;border-bottom:1px solid var(--line);}
.sb-logo h1{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:5px;text-transform:uppercase;color:var(--text);}
.sb-logo h1 span{color:var(--gold);}
.sb-logo p{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:3px;}
.sb-weather{padding:10px 16px;border-bottom:1px solid var(--line);font-size:13px;color:var(--text2);}
.sb-stats{padding:12px 16px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sb-stat{cursor:pointer;}
.sb-stat-v{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:300;color:var(--text);line-height:1;}
.sb-stat-v.g{color:var(--gold);}
.sb-stat-l{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:2px;}
.sb-quote{padding:12px 16px;border-bottom:1px solid var(--line);cursor:pointer;}
.sb-quote-t{font-family:'Cormorant Garamond',serif;font-size:11px;font-style:italic;color:var(--text2);line-height:1.5;}
.sb-quote-a{font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-top:4px;}
.sb-nav{flex:1;}
.ni{padding:11px 16px;cursor:pointer;color:var(--text2);font-size:9px;letter-spacing:2px;text-transform:uppercase;border-left:2px solid transparent;display:flex;align-items:center;justify-content:space-between;}
.ni.on{color:var(--text);border-left-color:var(--gold);background:rgba(201,150,58,0.06);}
.badge{font-size:7px;background:var(--bg3);color:var(--text3);padding:2px 6px;border-radius:2px;}
.ni.on .badge{background:rgba(201,150,58,0.1);color:var(--gold);}
.sb-date{padding:12px 16px;border-top:1px solid var(--line);font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);line-height:1.7;margin-top:auto;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{height:46px;border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 18px;gap:8px;flex-shrink:0;}
.topbar-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;letter-spacing:3px;text-transform:uppercase;color:var(--text2);flex:1;}
button.btn{padding:6px 14px;border-radius:2px;border:1px solid var(--line2);cursor:pointer;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;background:transparent;color:var(--text2);}
button.btn.gold{background:var(--gold);color:var(--bg);border-color:var(--gold);}
button.btn.red{background:var(--hot);color:#fff;border-color:var(--hot);}
.page{flex:1;overflow-y:auto;overflow-x:hidden;}
.page::-webkit-scrollbar{width:3px;}
.page::-webkit-scrollbar-thumb{background:var(--bg3);}
.card{margin:14px 16px 0;border:1px solid var(--line);border-radius:2px;background:var(--bg2);padding:14px 16px;}
.card-lbl{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--line);}
/* TICKER */
.split{display:grid;height:100%;overflow:hidden;}
.split-2{grid-template-columns:190px 1fr;}
.split-3{grid-template-columns:190px 200px 1fr;}
.ticker-left{border-right:1px solid var(--line);display:flex;flex-direction:column;background:var(--bg2);}
.ticker-hdr{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;}
.ticker-hdr span{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);}
.ticker-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid var(--line);}
.ticker-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
.ticker-val{font-family:'Cormorant Garamond',serif;font-size:44px;font-weight:300;letter-spacing:-3px;color:var(--text);line-height:1;}
.tbtns{display:flex;flex-direction:column;gap:4px;margin-left:auto;}
.tbtn2{width:32px;height:32px;border-radius:2px;border:1px solid var(--line2);background:var(--bg3);color:var(--text);cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:18px;display:flex;align-items:center;justify-content:center;user-select:none;}
.tbtn2:active{background:var(--gold);color:var(--bg);}
.ticker-foot{padding:10px 14px;border-top:1px solid var(--line);margin-top:auto;}
.ticker-foot button{width:100%;padding:8px;background:var(--gold);color:var(--bg);border:none;border-radius:2px;cursor:pointer;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--line);overflow-x:auto;flex-shrink:0;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:9px 10px;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Mono',monospace;white-space:nowrap;}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);}
/* LEADS */
.leads-panel{display:flex;flex-direction:column;overflow:hidden;}
.filter-row{padding:8px 10px;border-bottom:1px solid var(--line);display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0;}
.fp{padding:3px 8px;border:1px solid var(--line);border-radius:2px;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);cursor:pointer;}
.fp.on{color:var(--gold);border-color:rgba(201,150,58,0.3);background:rgba(201,150,58,0.06);}
.leads-body{flex:1;display:grid;grid-template-columns:200px 1fr;overflow:hidden;}
.lead-list{border-right:1px solid var(--line);overflow-y:auto;background:var(--bg2);display:flex;flex-direction:column;}
.lead-list::-webkit-scrollbar{display:none;}
.lli{padding:10px 12px;border-bottom:1px solid var(--line);cursor:pointer;border-left:2px solid transparent;}
.lli.on{background:var(--bg3);}
.lli-name{font-family:'Cormorant Garamond',serif;font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lli-sub{font-size:7px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lli-st{font-size:7px;letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.lead-detail{overflow-y:auto;padding:18px 20px;}
.lead-detail::-webkit-scrollbar{width:3px;}
.lead-detail::-webkit-scrollbar-thumb{background:var(--bg3);}
.ld-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--text);margin-bottom:3px;}
.ld-date{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.ld-badge{display:inline-block;font-size:7px;letter-spacing:3px;text-transform:uppercase;padding:3px 10px;border-radius:2px;border:1px solid;margin-bottom:14px;}
.ld-sec{margin-bottom:11px;}
.ld-sec-l{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--line);}
.ld-v{font-size:13px;color:var(--text);line-height:1.6;}
.ld-v.phone{font-size:17px;color:var(--gold);}
.ld-notes{font-family:'Cormorant Garamond',serif;font-size:14px;font-style:italic;color:var(--text2);line-height:1.75;}
.ld-map{width:100%;height:180px;border:1px solid var(--line);border-radius:2px;margin-top:6px;}
.ld-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;padding-top:10px;border-top:1px solid var(--line);}
.ld-btn{padding:6px 14px;border-radius:2px;border:1px solid var(--line2);cursor:pointer;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:1.5px;text-transform:uppercase;background:transparent;color:var(--text2);text-decoration:none;display:inline-flex;align-items:center;}
.ld-btn.maps{background:#1A73E8;color:#fff;border-color:#1A73E8;}
.ld-btn.del{color:var(--hot);border-color:rgba(176,58,46,0.3);}
.add-bar{padding:8px 10px;border-top:1px solid var(--line);margin-top:auto;}
.add-bar button{width:100%;padding:8px;border:1px dashed var(--line2);border-radius:2px;background:transparent;color:var(--gold);cursor:pointer;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;}
/* HIST */
.hist-day{padding:12px 14px;border-bottom:1px solid var(--line);}
.hist-lbl{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.hist-stats{display:flex;gap:14px;flex-wrap:wrap;}
.hv{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:var(--text);line-height:1;}
.hl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:2px;}
/* CAL */
.cal-wrap{padding:16px;overflow-y:auto;height:100%;}
.cal-wrap::-webkit-scrollbar{width:3px;}
.cal-goals-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px;}
.cal-goal-cell{background:var(--bg2);border:1px solid var(--line);border-radius:2px;padding:10px;}
.cal-goal-l{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.cal-goal-inp{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--gold);font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;padding:3px 0;outline:none;}
.cal-goal-inp::placeholder{color:var(--text3);font-size:14px;}
.cal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.cal-month{background:var(--bg2);border:1px solid var(--line);border-radius:2px;padding:10px;}
.cal-month-name{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px;}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.cal-dow-l{font-size:6px;color:var(--text3);text-align:center;}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.cal-day{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:8px;color:var(--text3);border-radius:2px;cursor:default;position:relative;}
.cal-day.has{color:var(--text);cursor:pointer;background:var(--bg3);}
.cal-day.today{color:var(--gold);font-weight:600;}
.cal-day.sel{background:rgba(201,150,58,0.1);}
.cal-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);position:absolute;bottom:1px;}
.cal-detail-card{background:var(--bg2);border:1px solid var(--line);border-radius:2px;padding:14px 16px;margin-bottom:16px;}
/* APPT */
.appt-left{border-right:1px solid var(--line);overflow-y:auto;background:var(--bg2);}
.appt-left::-webkit-scrollbar{display:none;}
.appt-month-hdr{padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);}
.appt-day-row{padding:8px 12px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;align-items:center;justify-content:space-between;}
.appt-day-row.on{background:rgba(201,150,58,0.06);border-left:2px solid var(--gold);}
.appt-day-l{font-size:11px;color:var(--text2);}
.appt-day-l.on{color:var(--text);}
.appt-badge2{font-size:7px;background:var(--gold);color:var(--bg);padding:1px 5px;border-radius:2px;}
.appt-right{display:flex;flex-direction:column;overflow:hidden;}
.appt-right-hdr{padding:12px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.appt-right-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text);}
.appt-slots{flex:1;overflow-y:auto;padding:10px 16px 40px;}
.slot-row{display:flex;gap:8px;min-height:32px;margin-bottom:4px;}
.slot-time{width:50px;font-size:7px;color:var(--text3);padding-top:6px;flex-shrink:0;}
.slot-body{flex:1;border-top:1px solid var(--line);min-height:32px;}
.appt-block{padding:5px 8px;border-radius:2px;margin-bottom:3px;position:relative;}
.appt-block-name{font-family:'Cormorant Garamond',serif;font-size:13px;color:#fff;line-height:1.2;}
.appt-block-sub{font-size:7px;color:rgba(255,255,255,0.6);margin-top:1px;}
.appt-del{position:absolute;right:5px;top:5px;background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:11px;padding:0;}
/* SCRIPT */
.script-wrap{padding:20px;height:100%;display:flex;flex-direction:column;}
.script-hdr{display:flex;align-items:center;margin-bottom:14px;flex-shrink:0;}
.script-hdr h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--text);flex:1;}
.script-hdr button{padding:7px 18px;background:var(--gold);color:var(--bg);border:none;border-radius:2px;cursor:pointer;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;}
#script-ta{flex:1;background:var(--bg2);border:1px solid var(--line);border-radius:2px;color:var(--text);font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;line-height:1.9;padding:20px;outline:none;resize:none;}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:500;display:none;align-items:center;justify-content:center;}
.overlay.on{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--line2);border-radius:2px;padding:22px;width:420px;max-width:94vw;max-height:90vh;overflow-y:auto;}
.modal::-webkit-scrollbar{display:none;}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.modal-hdr h3{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--text);}
.modal-hdr button{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
.fg{margin-bottom:12px;}
.fg label{display:block;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.fg input,.fg textarea,.fg select{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line2);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:6px 0;outline:none;}
.fg textarea{resize:none;min-height:55px;line-height:1.6;}
.fg select{background:var(--bg2);}
.fg select option{background:var(--bg2);}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.mbtn{display:block;width:100%;padding:10px;border-radius:2px;border:1px solid var(--line2);cursor:pointer;font-family:'DM Mono',monospace;font-size:7px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;background:transparent;color:var(--text2);}
.mbtn.gold{background:var(--gold);color:var(--bg);border-color:var(--gold);}
.mbtn.ghost{border-color:var(--line);color:var(--text3);}
.color-picks{display:flex;gap:6px;margin-top:6px;}
.cpick{width:26px;height:26px;border-radius:2px;cursor:pointer;border:2px solid transparent;}
.cpick.on{border-color:#fff;}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--bg3);border:1px solid var(--line2);border-radius:2px;padding:7px 16px;font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text2);opacity:0;transition:opacity .2s;pointer-events:none;z-index:3000;}
.toast.show{opacity:1;}
.empty{display:flex;align-items:center;justify-content:center;height:100%;font-family:'Cormorant Garamond',serif;font-style:italic;color:var(--text3);font-size:16px;}
</style>
</head>
<body>
<div class="app">
  <div class="sb">
    <div class="sb-logo">
      <h1>S<span>olar</span></h1>
      <p>Robby — Field Journal</p>
    </div>
    <div class="sb-weather" id="sb-weather">Loading weather...</div>
    <div class="sb-stats" id="sb-stats"></div>
    <div class="sb-quote" id="sb-quote" onclick="nextQuote()"></div>
    <nav class="sb-nav">
      <div class="ni on" id="ni-today" onclick="go('today')">Today</div>
      <div class="ni" id="ni-field" onclick="go('field')"><span>Field & Leads</span><span class="badge" style="color:var(--gold)">Live</span></div>
      <div class="ni" id="ni-calendar" onclick="go('calendar')"><span>Calendar</span><span class="badge">2026</span></div>
      <div class="ni" id="ni-appt" onclick="go('appt')"><span>Appointments</span><span class="badge" id="appt-badge">0</span></div>
      <div class="ni" id="ni-script" onclick="go('script')"><span>My Script</span><span class="badge">edit</span></div>
    </nav>
    <div class="sb-date" id="sb-date"></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title" id="topbar-title">Today</div>
      <button class="btn gold" id="topbar-btn" onclick="topBtn()">+ Lead</button>
    </div>
    <div class="page" id="page"></div>
  </div>
</div>

<div class="overlay" id="lead-modal">
  <div class="modal">
    <div class="modal-hdr"><h3 id="lead-modal-title">New Lead</h3><button onclick="closeModal('lead-modal')">×</button></div>
    <input type="hidden" id="l-id">
    <div class="fg"><label>Name</label><input id="l-name" placeholder="Full name"></div>
    <div class="fg"><label>Phone</label><input id="l-phone" type="tel" placeholder="(555) 000-0000"></div>
    <div class="fg"><label>Email</label><input id="l-email" placeholder="email@example.com"></div>
    <div class="fg"><label>Address</label><input id="l-addr" placeholder="123 Main St, City, NJ"></div>
    <div class="fg"><label>Utility</label><input id="l-util" placeholder="PSE&G, JCP&L..."></div>
    <div class="frow">
      <div class="fg"><label>Bill ($/mo)</label><input id="l-bill" type="number" placeholder="0"></div>
      <div class="fg"><label>kWh/mo</label><input id="l-kwh" type="number" placeholder="0"></div>
    </div>
    <div class="fg"><label>Status</label><select id="l-status"><option value="hot">Hot</option><option value="warm" selected>Warm</option><option value="cold">Cold</option></select></div>
    <div class="frow">
      <div class="fg"><label>Date Met</label><input id="l-date" type="date"></div>
      <div class="fg"><label>Follow-Up</label><input id="l-followup" type="date"></div>
    </div>
    <div class="fg"><label>Notes</label><textarea id="l-notes" placeholder="Roof, shading, objections..."></textarea></div>
    <button class="mbtn gold" onclick="saveLead()">Save Lead</button>
    <button class="mbtn ghost" onclick="closeModal('lead-modal')">Cancel</button>
  </div>
</div>

<div class="overlay" id="appt-modal">
  <div class="modal">
    <div class="modal-hdr"><h3>New Appointment</h3><button onclick="closeModal('appt-modal')">×</button></div>
    <div class="fg"><label>Name</label><input id="a-name" placeholder="Contact name"></div>
    <div class="fg"><label>Phone</label><input id="a-phone" type="tel" placeholder="(555) 000-0000"></div>
    <div class="fg"><label>Address</label><input id="a-addr" placeholder="123 Main St"></div>
    <div class="frow">
      <div class="fg"><label>Date</label><input id="a-date" type="date"></div>
      <div class="fg"><label>Time</label><input id="a-time" type="time"></div>
    </div>
    <div class="fg"><label>Notes</label><textarea id="a-notes" placeholder="Details..."></textarea></div>
    <div class="fg">
      <label>Color</label>
      <div class="color-picks">
        <div class="cpick on" style="background:var(--hot)" data-c="hot" onclick="pickColor(this)"></div>
        <div class="cpick" style="background:var(--warm)" data-c="warm" onclick="pickColor(this)"></div>
        <div class="cpick" style="background:var(--conf)" data-c="conf" onclick="pickColor(this)"></div>
        <div class="cpick" style="background:var(--cold)" data-c="cold" onclick="pickColor(this)"></div>
        <div class="cpick" style="background:var(--fup)" data-c="fup" onclick="pickColor(this)"></div>
      </div>
      <div style="font-size:7px;color:var(--text3);margin-top:5px">Red=Hot · Orange=Warm · Green=Confirmed · Blue=Follow-Up · Purple=Other</div>
    </div>
    <button class="mbtn gold" onclick="saveAppt()">Save Appointment</button>
    <button class="mbtn ghost" onclick="closeModal('appt-modal')">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var sessions = JSON.parse(localStorage.getItem('sol_sess') || '[]');
var leads = JSON.parse(localStorage.getItem('sol_leads') || '[]');
var appts = JSON.parse(localStorage.getItem('sol_appts') || '[]');
var mGoals = JSON.parse(localStorage.getItem('sol_goals') || '{}');

function td() { return new Date().toISOString().split('T')[0]; }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function fmtD(d) { if(!d) return ''; return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }
function fmtS(d) { if(!d) return ''; return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtT(t) { if(!t) return ''; var p=t.split(':'),h=+p[0]; return (h%12||12)+':'+p[1]+' '+(h>=12?'PM':'AM'); }
function ago(n) { var d=new Date(); d.setDate(d.getDate()-n); return d.toISOString().split('T')[0]; }
function sc(s) { return s==='hot'?'var(--hot)':s==='warm'?'var(--warm)':s==='cold'?'var(--cold)':s==='conf'?'var(--conf)':'var(--fup)'; }

// WEATHER
function loadWeather() {
  if (!navigator.geolocation) { document.getElementById('sb-weather').textContent = 'No location'; return; }
  navigator.geolocation.getCurrentPosition(function(pos) {
    fetch('https://api.open-meteo.com/v1/forecast?latitude='+pos.coords.latitude+'&longitude='+pos.coords.longitude+'&current_weather=true&temperature_unit=fahrenheit')
      .then(function(r){return r.json();})
      .then(function(d){
        var t=Math.round(d.current_weather.temperature);
        var c=d.current_weather.weathercode;
        var icon=c===0?'☀️':c<=2?'⛅':c===3?'☁️':c<=49?'🌫️':c<=69?'🌧️':c<=79?'❄️':'⛈️';
        var desc=c===0?'Clear Sky':c<=2?'Partly Cloudy':c===3?'Overcast':c<=49?'Foggy':c<=69?'Rainy':c<=79?'Snowy':'Stormy';
        document.getElementById('sb-weather').innerHTML='<div style="font-family:\'Cormorant Garamond\',serif;font-size:26px;font-weight:300;color:var(--text);line-height:1">'+t+'°F '+icon+'</div><div style="font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--text3);margin-top:2px">'+desc+'</div>';
      }).catch(function(){document.getElementById('sb-weather').textContent='Weather unavailable';});
  }, function(){document.getElementById('sb-weather').textContent='Weather unavailable';}, {timeout:6000});
}

    +'<div class="ticker-left">'

      +'<button class="tbtn2" onclick="tick(\''+f.k+'\',-1)" style="color:var(--text3)">−</button>'

    +'<div class="tabs">';

  });

function tick(k,d) {
  ticker[k] = Math.max(0,(ticker[k]||0)+d);
  save();
  updateSidebar();
  var el = document.getElementById('tv-'+k);
  if(el) el.textContent = ticker[k];
}

function resetTicker() {
  if(!confirm('Reset all counts?')) return;
  FLDS.forEach(function(f){ticker[f.k]=0;});
  save();
  renderField();
  updateSidebar();
}

function setLeadTab(t) {
  leadTab = t;
  var el = document.getElementById('ltb');
  if(el) el.innerHTML = buildLeadTab();
  document.querySelectorAll('.tab').forEach(function(b){
    b.classList.toggle('on', LTABS.some(function(x){return x.id===t&&x.l===b.textContent;}));
  });
}

function buildLeadTab() {
  if(leadTab==='leads') return buildLeadsPanel();
  if(leadTab==='alltime') return buildAllTime();
  if(leadTab==='lastmonth') return buildLastMonth();
  var days = leadTab==='yesterday'?1:leadTab==='7days'?7:14;
  return buildHistDays(days);
}

function buildLeadsPanel() {
  var fl = leadFilter==='all'?leads:leads.filter(function(l){return l.status===leadFilter;});
  var sl = fl.slice().sort(function(a,b){var o={hot:0,warm:1,cold:2};return(o[a.status]-o[b.status])||b.ts-a.ts;});
  var sel = selLeadId?leads.find(function(l){return l.id===selLeadId;}):null;
  var html = '<div class="filter-row">';
  ['all','hot','warm','cold'].forEach(function(f){
    var cnt = f==='all'?leads.length:leads.filter(function(l){return l.status===f;}).length;
    html+='<div class="fp'+(leadFilter===f?' on':'')+'" onclick="setFilter(\''+f+'\')">'+(f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1))+' '+cnt+'</div>';
  });
  html+='</div><div class="leads-body"><div class="lead-list"><div style="flex:1;overflow-y:auto">';
  if(sl.length) {
    sl.forEach(function(l){
      html+='<div class="lli'+(selLeadId===l.id?' on':'')+'" onclick="selectLead(\''+l.id+'\')" style="border-left-color:'+sc(l.status)+'">'
        +'<div class="lli-name">'+l.name+'</div>'
        +'<div class="lli-sub">'+(l.addr||'No address')+'</div>'
        +'<div class="lli-st" style="color:'+sc(l.status)+'">'+l.status.toUpperCase()+'</div></div>';
    });
  } else {
    html+='<div class="empty">No leads yet</div>';
  }
  html+='</div><div class="add-bar"><button onclick="openLeadModal()">+ New Lead</button></div></div>'
    +'<div class="lead-detail">'+(sel?buildLD(sel):'<div class="empty">Select a lead</div>')+'</div></div>';
  return html;
}

function buildLD(l) {
  var mapSrc = l.addr?'https://maps.google.com/maps?q='+encodeURIComponent(l.addr)+'&output=embed':'';
  var html = '<div class="ld-name">'+l.name+'</div>'
    +'<div class="ld-date">'+fmtD(l.date)+'</div>'
    +'<div class="ld-badge" style="color:'+sc(l.status)+';border-color:'+sc(l.status)+'55">'+l.status.toUpperCase()+'</div>';
  if(l.phone) html+='<div class="ld-sec"><div class="ld-sec-l">Phone</div><div class="ld-v phone">'+l.phone+'</div></div>';
  if(l.email) html+='<div class="ld-sec"><div class="ld-sec-l">Email</div><div class="ld-v" style="color:var(--gold)">'+l.email+'</div></div>';
  if(l.addr) html+='<div class="ld-sec"><div class="ld-sec-l">Address</div><div class="ld-v">'+l.addr+'</div></div>';
  if(l.util||l.bill) html+='<div class="ld-sec"><div class="ld-sec-l">Details</div><div class="ld-v">'+(l.util||'')+(l.bill?' · $'+l.bill+'/mo':'')+(l.kwh?' · '+l.kwh+' kWh':'')+'</div></div>';
  if(l.followup) html+='<div class="ld-sec"><div class="ld-sec-l">Follow-Up</div><div class="ld-v" style="color:var(--gold)">'+fmtD(l.followup)+'</div></div>';
  if(l.notes) html+='<div class="ld-sec"><div class="ld-sec-l">Notes</div><div class="ld-notes">'+l.notes+'</div></div>';
  if(mapSrc) html+='<div class="ld-sec"><div class="ld-sec-l">Map</div><iframe class="ld-map" src="'+mapSrc+'" frameborder="0" loading="lazy" allowfullscreen></iframe></div>';
  html+='<div class="ld-actions">';
  if(l.addr) html+='<a href="https://maps.google.com/?q='+encodeURIComponent(l.addr)+'" target="_blank" class="ld-btn maps">Google Maps</a>';
  html+='<button class="ld-btn" onclick="openLeadModal(\''+l.id+'\')">Edit</button>'
    +'<button class="ld-btn del" onclick="deleteLead(\''+l.id+'\')">Delete</button></div>';
  return html;
}

function buildHistDays(days) {
  var html='<div style="flex:1;overflow-y:auto">';var found=false;
  for(var i=1;i<=days;i++){
    var dStr=ago(i);
    var sess=sessions.filter(function(s){return s.date===dStr;});
    var dl=leads.filter(function(l){return l.date===dStr;});
    if(!sess.length&&!dl.length)continue;found=true;
    var label=i===1?'Yesterday':new Date(dStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
    html+='<div class="hist-day"><div class="hist-lbl">'+label+'</div>';
    if(sess.length){
      html+='<div class="hist-stats">';
      var stats=[['Doors',sess.reduce(function(a,s){return a+(+s.doors||0);},0)],['Talks',sess.reduce(function(a,s){return a+(+s.ho||0);},0)],['Sits',sess.reduce(function(a,s){return a+(+s.sits||0);},0)],['Sales',sess.reduce(function(a,s){return a+(+s.sales||0);},0)]];
      stats.forEach(function(x){html+='<div><div class="hv">'+x[1]+'</div><div class="hl">'+x[0]+'</div></div>';});
      html+='</div>';
    }
    if(dl.length){
      html+='<div style="margin-top:8px">';
      dl.forEach(function(l){html+='<div onclick="selectLead(\''+l.id+'\');setLeadTab(\'leads\')" style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-top:1px solid var(--line);cursor:pointer"><div style="font-family:\'Cormorant Garamond\',serif;font-size:13px;color:var(--text)">'+l.name+'</div><div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:'+sc(l.status)+'">'+l.status+'</div></div>';});
      html+='</div>';
    }
    html+='</div>';
  }
  if(!found) html+='<div class="empty">No data for this period</div>';
  return html+'</div>';
}

function buildLastMonth() {
  var now=new Date();var lmY=now.getMonth()===0?now.getFullYear()-1:now.getFullYear();var lmM=now.getMonth()===0?11:now.getMonth()-1;
  var lmStr=lmY+'-'+String(lmM+1).padStart(2,'0');var mName=new Date(lmY,lmM,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var mS=sessions.filter(function(s){return s.date.startsWith(lmStr);});
  var mL=leads.filter(function(l){return l.date&&l.date.startsWith(lmStr);});
  if(!mS.length&&!mL.length) return '<div class="empty">No data for '+mName+'</div>';
  var html='<div style="flex:1;overflow-y:auto"><div class="hist-day" style="background:var(--bg3)"><div class="hist-lbl" style="color:var(--gold)">'+mName+' — Summary</div><div class="hist-stats">';
  [['Doors',mS.reduce(function(a,s){return a+(+s.doors||0);},0)],['Talks',mS.reduce(function(a,s){return a+(+s.ho||0);},0)],['Leads',mL.length],['Sales',mS.reduce(function(a,s){return a+(+s.sales||0);},0)]].forEach(function(x){html+='<div><div class="hv">'+x[1]+'</div><div class="hl">'+x[0]+'</div></div>';});
  html+='</div></div>';
  mL.sort(function(a,b){var o={hot:0,warm:1,cold:2};return o[a.status]-o[b.status];}).forEach(function(l){
    html+='<div onclick="selectLead(\''+l.id+'\');setLeadTab(\'leads\')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer"><div><div style="font-family:\'Cormorant Garamond\',serif;font-size:14px;color:var(--text)">'+l.name+'</div>'+(l.addr?'<div style="font-size:7px;color:var(--text3)">'+l.addr+'</div>':'')+'</div><div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:'+sc(l.status)+'">'+l.status+'</div></div>';
  });
  return html+'</div>';
}

function buildAllTime() {
  var fl=leadFilter==='all'?leads:leads.filter(function(l){return l.status===leadFilter;});
  var sl=fl.slice().sort(function(a,b){var o={hot:0,warm:1,cold:2};return(o[a.status]-o[b.status])||b.ts-a.ts;});
  var html='<div style="flex:1;overflow-y:auto"><div class="hist-day" style="background:var(--bg3)"><div class="hist-lbl" style="color:var(--gold)">All Time</div><div class="hist-stats">';
  [['Doors',sessions.reduce(function(a,s){return a+(+s.doors||0);},0)],['Leads',leads.length],['Sales',sessions.reduce(function(a,s){return a+(+s.sales||0);},0)]].forEach(function(x){html+='<div><div class="hv">'+x[1]+'</div><div class="hl">'+x[0]+'</div></div>';});
  html+='</div></div><div class="filter-row">';
  ['all','hot','warm','cold'].forEach(function(f){var cnt=f==='all'?leads.length:leads.filter(function(l){return l.status===f;}).length;html+='<div class="fp'+(leadFilter===f?' on':'')+'" onclick="setFilter(\''+f+'\');setLeadTab(\'alltime\')">'+(f==='all'?'All':f.charAt(0).toUpperCase()+f.slice(1))+' '+cnt+'</div>';});
  html+='</div>';
  sl.forEach(function(l){
    html+='<div onclick="selectLead(\''+l.id+'\');setLeadTab(\'leads\')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer"><div><div style="font-family:\'Cormorant Garamond\',serif;font-size:14px;color:var(--text)">'+l.name+'</div>'+(l.phone?'<div style="font-size:9px;color:var(--gold)">'+l.phone+'</div>':'')+(l.addr?'<div style="font-size:7px;color:var(--text3)">'+l.addr+'</div>':'')+(l.date?'<div style="font-size:7px;color:var(--text3)">'+fmtS(l.date)+'</div>':'')+'</div><div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:'+sc(l.status)+'">'+l.status+'</div></div>';
  });
  return html+'</div>';
}

// LEAD CRUD
function openLeadModal(id) {
  document.getElementById('l-id').value=id||'';
  document.getElementById('lead-modal-title').textContent=id?'Edit Lead':'New Lead';
  if(id){
    var l=leads.find(function(x){return x.id===id;});if(!l)return;
    document.getElementById('l-name').value=l.name||'';
    document.getElementById('l-phone').value=l.phone||'';
    document.getElementById('l-email').value=l.email||'';
    document.getElementById('l-addr').value=l.addr||'';
    document.getElementById('l-util').value=l.util||'';
    document.getElementById('l-bill').value=l.bill||'';
    document.getElementById('l-kwh').value=l.kwh||'';
    document.getElementById('l-status').value=l.status||'warm';
    document.getElementById('l-date').value=l.date||td();
    document.getElementById('l-followup').value=l.followup||'';
    document.getElementById('l-notes').value=l.notes||'';
  } else {
    ['l-name','l-phone','l-email','l-addr','l-util','l-bill','l-kwh','l-notes','l-followup'].forEach(function(i){document.getElementById(i).value='';});
    document.getElementById('l-status').value='warm';
    document.getElementById('l-date').value=td();
  }
  openModal('lead-modal');

function saveLead() {
  var name=document.getElementById('l-name').value.trim();
  if(!name){showToast('Name required');return;}
  var editId=document.getElementById('l-id').value;
  var data={name:name,phone:document.getElementById('l-phone').value,email:document.getElementById('l-email').value,addr:document.getElementById('l-addr').value,util:document.getElementById('l-util').value,bill:document.getElementById('l-bill').value,kwh:document.getElementById('l-kwh').value,status:document.getElementById('l-status').value,date:document.getElementById('l-date').value,followup:document.getElementById('l-followup').value,notes:document.getElementById('l-notes').value};
  if(editId){
    leads=leads.map(function(l){return l.id===editId?Object.assign({},l,data):l;});
    selLeadId=editId;
  } else {
    var nl=Object.assign({},data,{id:uid(),ts:Date.now()});
    leads.push(nl);selLeadId=nl.id;
  }
  save();closeModal('lead-modal');updateSidebar();
  if(curPage==='field')renderField();
  if(curPage==='today')renderToday();
  showToast(editId?'Lead updated':'Lead saved!');
}

function deleteLead(id) {
  if(!confirm('Delete this lead?'))return;
  leads=leads.filter(function(l){return l.id!==id;});
  selLeadId=null;save();updateSidebar();
  if(curPage==='field')renderField();
}

// SESSION
function openSessionPrompt() {
  var date=prompt('Date (YYYY-MM-DD):',td());if(!date)return;
  var doors=parseInt(prompt('Doors:','0'))||0;
  var ho=parseInt(prompt('Talks:','0'))||0;
  var sits=parseInt(prompt('Sits:','0'))||0;
  var sales=parseInt(prompt('Sales:','0'))||0;
  var area=prompt('Area:','')||'';

  save();if(curPage==='today')renderToday();if(curPage==='calendar')renderCalendar();

// CALENDAR
function renderCalendar() {
  var sessByDate={};
  sessions.forEach(function(s){if(!sessByDate[s.date])sessByDate[s.date]=[];sessByDate[s.date].push(s);});
  var months=[];var y=2026,m=3;
  while(!(y===2028&&m===12)){months.push({y:y,m:m});m++;if(m>11){m=0;y++;}}months.push({y:2028,m:11});
  var DOW=['S','M','T','W','T','F','S'];var todayStr=td();
  var detailHTML='';
  if(calSelDay){
    var sess=sessByDate[calSelDay]||[];
    if(sess.length){
      var doors=sess.reduce(function(a,s){return a+(+s.doors||0);},0);
      var talks=sess.reduce(function(a,s){return a+(+s.ho||0);},0);
      var sits=sess.reduce(function(a,s){return a+(+s.sits||0);},0);
      var sales=sess.reduce(function(a,s){return a+(+s.sales||0);},0);
      var area=sess.map(function(s){return s.area;}).filter(Boolean).join(', ');
      var notes=sess.map(function(s){return s.notes;}).filter(Boolean).join(' / ');
      detailHTML='<div class="cal-detail-card"><div style="font-family:\'Cormorant Garamond\',serif;font-size:18px;font-weight:300;color:var(--text);margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--line)">'+fmtD(calSelDay)+'</div>'+(area?'<div style="font-size:8px;color:var(--text3);margin-bottom:8px">'+area+'</div>':'')+'<div style="display:flex;gap:18px;flex-wrap:wrap">';
      [['Doors',doors],['Talks',talks],['Sits',sits],['Sales',sales]].forEach(function(x){detailHTML+='<div><div style="font-family:\'Cormorant Garamond\',serif;font-size:28px;font-weight:300;color:var(--text);line-height:1">'+x[1]+'</div><div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-top:3px">'+x[0]+'</div></div>';});
      detailHTML+='</div>'+(notes?'<div style="font-size:11px;color:var(--text3);margin-top:8px;font-style:italic">'+notes+'</div>':'')+'</div>';
    }
  }
  var goalsHTML='<div style="margin-bottom:18px"><div style="font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--line)">Monthly Income Goals</div><div class="cal-goals-grid">';
  months.slice(0,12).forEach(function(x){
    var key=x.y+'-'+String(x.m+1).padStart(2,'0');
    var mName=new Date(x.y,x.m,1).toLocaleDateString('en-US',{month:'short'});
    goalsHTML+='<div class="cal-goal-cell"><div class="cal-goal-l">'+mName+' '+x.y+'</div><input class="cal-goal-inp" value="'+(mGoals[key]||'')+'" placeholder="$0" onchange="mGoals[\''+key+'\']=this.value;localStorage.setItem(\'sol_goals\',JSON.stringify(mGoals))"></div>';
  });
  goalsHTML+='</div></div>';
  var calsHTML='<div class="cal-grid">';
  months.forEach(function(x){
    var key=x.y+'-'+String(x.m+1).padStart(2,'0');
    var mName=new Date(x.y,x.m,1).toLocaleDateString('en-US',{month:'long'});
    var dim=new Date(x.y,x.m+1,0).getDate();var fdow=new Date(x.y,x.m,1).getDay();
    var cells='';for(var i=0;i<fdow;i++)cells+='<div class="cal-day"></div>';
    for(var d=1;d<=dim;d++){
      var dStr=x.y+'-'+String(x.m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var has=(sessByDate[dStr]||[]).length>0;var isToday=dStr===todayStr;var isSel=dStr===calSelDay;
      cells+='<div class="cal-day'+(has?' has':'')+(isToday?' today':'')+(isSel?' sel':'')+'"'+(has?' onclick="calClick(\''+dStr+'\')"':'')+'>'+d+(has?'<span class="cal-dot"></span>':'')+'</div>';
    }
    calsHTML+='<div class="cal-month"><div class="cal-month-name">'+mName+' '+x.y+'</div><div class="cal-dow">'+DOW.map(function(d){return'<div class="cal-dow-l">'+d+'</div>';}).join('')+'</div><div class="cal-days">'+cells+'</div></div>';
  });
  calsHTML+='</div>';
  document.getElementById('page').innerHTML='<div class="cal-wrap">'+goalsHTML+(detailHTML?detailHTML:'')+'<div style="font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:12px">Tap a gold dot to see session details</div>'+calsHTML+'</div>';
}

function calClick(dStr){calSelDay=calSelDay===dStr?null:dStr;renderCalendar();setTimeout(function(){var el=document.querySelector('.cal-detail-card');if(el)el.scrollIntoView({behavior:'smooth'});},50);}

// APPOINTMENTS
function renderAppt() {
  var months=[];for(var y=2024;y<=2028;y++)for(var m=0;m<12;m++)months.push({y:y,m:m});
  var now=new Date();
  var leftHTML='';
  months.forEach(function(x){
    var mStr=x.y+'-'+String(x.m+1).padStart(2,'0');
    var mName=new Date(x.y,x.m,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
    var mAppts=appts.filter(function(a){return a.date.startsWith(mStr);});
    var dim=new Date(x.y,x.m+1,0).getDate();
    var isCurrentMonth=x.y===now.getFullYear()&&x.m===now.getMonth();
    var daysHTML='';
    for(var d=1;d<=dim;d++){
      var dStr=x.y+'-'+String(x.m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
      var cnt=appts.filter(function(a){return a.date===dStr;}).length;
      var label=new Date(dStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',day:'numeric'});
      daysHTML+='<div class="appt-day-row'+(apptDay===dStr?' on':'')+'" onclick="setApptDay(\''+dStr+'\')">'
        +'<div class="appt-day-l'+(apptDay===dStr?' on':'')+'">'+label+'</div>'
        +(cnt?'<span class="appt-badge2">'+cnt+'</span>':'')+'</div>';
    }
    leftHTML+='<div><div class="appt-month-hdr" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'block\':\'none\'">'
      +'<span>'+mName+'</span>'+(mAppts.length?'<span style="color:var(--gold);font-size:7px">'+mAppts.length+'</span>':'')+'</div>'
      +'<div style="display:'+(isCurrentMonth?'block':'none')+'">'+daysHTML+'</div></div>';
  });
  var slots=[];for(var h=8;h<=21;h++)for(var mn=0;mn<60;mn+=30)slots.push(String(h).padStart(2,'0')+':'+String(mn).padStart(2,'0'));
  var dayAppts=appts.filter(function(a){return a.date===apptDay;}).sort(function(a,b){return a.time.localeCompare(b.time);});
  var dayLabel=new Date(apptDay+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  var slotsHTML='';
  slots.forEach(function(slot){
    var sa=dayAppts.filter(function(a){return a.time===slot;});
    slotsHTML+='<div class="slot-row"><div class="slot-time">'+fmtT(slot)+'</div><div class="slot-body">';
    sa.forEach(function(a){
      slotsHTML+='<div class="appt-block" style="background:'+sc(a.color)+'">'
        +'<div class="appt-block-name">'+a.name+'</div>'
        +(a.addr?'<div class="appt-block-sub">'+a.addr+'</div>':'')
        +(a.notes?'<div class="appt-block-sub">'+a.notes+'</div>':'')
        +'<button class="appt-del" onclick="deleteAppt(\''+a.id+'\')">×</button></div>';
    });
    slotsHTML+='</div></div>';
  });
  document.getElementById('page').innerHTML='<div class="split split-2" style="height:100%">'
    +'<div class="appt-left">'+leftHTML+'</div>'
    +'<div class="appt-right">'
    +'<div class="appt-right-hdr"><div class="appt-right-title">'+dayLabel+'</div><button class="btn gold" onclick="openApptModal()">+ Add</button></div>'
    +'<div class="appt-slots">'+(dayAppts.length===0?'<div class="empty" style="padding-top:60px">No appointments — tap + Add</div>':'')+slotsHTML+'</div>'
    +'</div></div>';
}

}

function saveAppt(){
  var name=document.getElementById('a-name').value.trim();if(!name){showToast('Name required');return;}
  appts.push({id:uid(),name:name,phone:document.getElementById('a-phone').value,addr:document.getElementById('a-addr').value,date:document.getElementById('a-date').value,time:document.getElementById('a-time').value,notes:document.getElementById('a-notes').value,color:apptColor,ts:Date.now()});
  save();closeModal('appt-modal');updateSidebar();renderAppt();showToast('Appointment saved!');
}

function deleteAppt(id){
  if(!confirm('Delete?'))return;
  appts=appts.filter(function(a){return a.id!==id;});
  save();updateSidebar();renderAppt();
}

// SCRIPT
function renderScript(){
  document.getElementById('page').innerHTML='<div class="script-wrap"><div class="script-hdr"><h2>My Script</h2><button onclick="saveScript()">Save</button></div><textarea id="script-ta">'+esc(scriptTxt)+'</textarea></div>';

}

function saveScript(){
var ta=document.getElementById(‘script-ta’);if(!ta)return;
scriptTxt=ta.value;localStorage.setItem(‘sol_script’,scriptTxt);showToast(‘Script saved!’);
}

function esc(s){return(s||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’);}

// MODALS
function openModal(id){document.getElementById(id).classList.add(‘on’);}
function closeModal(id){document.getElementById(id).classList.remove(‘on’);}
document.querySelectorAll(’.overlay’).forEach(function(o){o.addEventListener(‘click’,function(e){if(e.target===o)o.classList.remove(‘on’);});});

function showToast(msg){var t=document.getElementById(‘toast’);t.textContent=msg;t.classList.add(‘show’);setTimeout(function(){t.classList.remove(‘show’);},2200);}

// INIT
try { loadWeather(); } catch(e) {}
try { updateSidebar(); } catch(e) {}
try { renderToday(); } catch(e) { document.getElementById(‘page’).innerHTML = ‘<div style="padding:40px;color:#C9963A;font-family:DM Mono,monospace;font-size:12px">App loaded. Tap a page in the sidebar.</div>’; }
</script>
